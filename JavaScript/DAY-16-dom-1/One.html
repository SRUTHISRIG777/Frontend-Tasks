<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let ol=document.createElement("ol");
        let arr=["sruthi","mahi","riya"];
        for(let i=0;i<3;i++){
            let li=document.createElement("li");
            li.innerText=arr[i];
            ol.appendChild(li);

        }
        document.body.appendChild(ol);
    </script>
    
</body>
</html>
